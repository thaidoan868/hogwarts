name: Manual Deploy to ECS - Hogwarts (staging branch)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Docker image version to deploy (e.g. 0.2, dev, latest)"
        required: true
        default: "latest"

env:
  AWS_REGION: ap-southeast-1
  CLUSTER_NAME: hogwarts-cluster
  SERVICE_NAME: hogwarts-app-service
  FAMILY_NAME: hogwarts-app-task
  CONTAINER_NAME: hogwarts-app
  DOCKER_IMAGE: thaidoan868/hogwarts-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy ECS service
        run: |
          IMAGE="${{ env.DOCKER_IMAGE }}:${{ github.event.inputs.version }}"
          echo "Deploying version: $IMAGE"

          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $FAMILY_NAME)

          # Replace image with selected version
          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "$IMAGE" \
            '.taskDefinition.containerDefinitions[0].image = $IMAGE |
             {family: .taskDefinition.family,
              containerDefinitions: .taskDefinition.containerDefinitions,
              requiresCompatibilities: .taskDefinition.requiresCompatibilities,
              networkMode: .taskDefinition.networkMode,
              cpu: .taskDefinition.cpu,
              memory: .taskDefinition.memory,
              executionRoleArn: .taskDefinition.executionRoleArn,
              taskRoleArn: .taskDefinition.taskRoleArn}')

          echo "$NEW_TASK_DEF" > new-task-def.json

          # Register new revision
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "New task definition: $NEW_TASK_DEF_ARN"

          # Update ECS service
          aws ecs update-service \
            --cluster $CLUSTER_NAME \
            --service $SERVICE_NAME \
            --task-definition $NEW_TASK_DEF_ARN

          echo "ECS service updated successfully!"
