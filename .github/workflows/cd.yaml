name: CD - Deploy to AWS ECS

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Docker image version to deploy (e.g. 0.1.0, dev, latest)"
        required: true
        default: "latest"

permissions:
  contents: read

env:
  AWS_REGION: ap-southeast-1
  DOCKER_IMAGE: thaidoan868/hogwarts-app
  CLUSTER_NAME: hogwarts-cluster
  SERVICE_NAME: hogwarts-app-service
  TF_DIR: deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERSION_INPUT: ${{ github.event.inputs.version }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Build image tag and persist
        shell: bash
        run: |
          IMAGE="${DOCKER_IMAGE}:${VERSION_INPUT}"
          echo "Deploying image: ${IMAGE}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_IN_AUTOMATION: "true"
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform apply (update ECS Task Definition)
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_IN_AUTOMATION: "true"
        run: |
          terraform apply -auto-approve -input=false \
            -var="docker_image=${IMAGE}"

      - name: Read new task definition ARN from Terraform
        working-directory: ${{ env.TF_DIR }}
        run: |
          TASK_DEF_ARN="$(terraform output -raw task_def_arn)"
          echo "TASK_DEF_ARN=${TASK_DEF_ARN}" >> "$GITHUB_ENV"
          echo "New task def: ${TASK_DEF_ARN}"

      - name: Update ECS service to use new task definition
        run: |
          aws ecs update-service \
            --cluster "${CLUSTER_NAME}" \
            --service "${SERVICE_NAME}" \
            --task-definition "${TASK_DEF_ARN}" \
            --force-new-deployment \
            --region ${AWS_REGION}