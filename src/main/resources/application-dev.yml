spring:
  # Database Configuration
  jackson:
    time-zone: Asia/Ho_Chi_Minh
  datasource:
    url: jdbc:postgresql://localhost:5432/hogwarts
    username: sa
    password: sa123
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: true
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      javax:
        persistence:
          validation:
            mode: auto
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: public
    baseline-on-migrate: false

  # Security Configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/hogwarts
  # Error Configuration
  error:
    whitelabel:
      enabled: false
  mvc:
    throw-exception-if-no-handler-found: true

  # Maximum file upload size
  servlet:
    multipart:
          max-file-size: 100MB
          max-request-size: 500MB


# Health Check
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application:

# Security Configuration
keycloak:
  server-url: http://localhost:8080
  realm: hogwarts
  client-id: backend
  client-secret: APYtOv32HuVupfco6m0ltbf0RcXp1atx

# minIO
minio:
  endpoint: http://localhost:9000
  access-key: admin
  secret-key: admin123
  bucket: images
  secure: false

# static resource
resources:
  imageResourceUrl: http://localhost:9000 # the image url format is: {imageResourceUrl}/{bucket}/{objectname}
