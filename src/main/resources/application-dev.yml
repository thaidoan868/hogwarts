spring:
  # Database Configuration
  jackson:
    time-zone: Asia/Ho_Chi_Minh
    default-property-inclusion: non_null
  datasource:
    url: jdbc:postgresql://localhost:5432/hogwarts
    username: sa
    password: sa123
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: true
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      javax:
        persistence:
          validation:
            mode: auto
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: public
    baseline-on-migrate: false

  # Security Configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/hogwarts
  # Error Configuration
  error:
    whitelabel:
      enabled: false
  mvc:
    throw-exception-if-no-handler-found: true

  # Maximum file upload size
  servlet:
    multipart:
          max-file-size: 100MB
          max-request-size: 500MB
  # Email configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: "your-email@gmail.com"
    from-display-name: "Hogwarts Forum"
    password: "app-password"
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true


# Health Check
management:
  server.port: 8082
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
      status:
        http-mapping:
          UP: 200
          DOWN: 503
          OUT_OF_SERVICE: 503
          UNKNOWN: 503
  metrics:
    tags:
      application:

# Security Configuration
keycloak:
  server-url: http://localhost:8080

  realm: hogwarts
  client-id: backend
  client-secret: APYtOv32HuVupfco6m0ltbf0RcXp1atx



# Object Storage
minio:
  endpoint: http://localhost:9000
  access-key: admin
  secret-key: admin123
  secure: false
aws.s3:
  region: ap-southeast-1
  access-key: ""
  secret-key: ""


# static resource
resources:
  # where to save static resources
  bucket: images
  baseResourceUrl: http://localhost:9000 # the file url format is: {baseResourceUrl}/{bucket}/{objectname}

# Logging
logging:
  level:
    root: INFO
    vn.conguyetduong.hogwarts: TRACE
    org.springframework.web: INFO
    io.opentelemetry: INFO

# Tracing
otel:
  exporter:
    otlp:
      # Jaeger
      endpoint: http://localhost:4317
      protocol: grpc
  metrics:
    exporter: none

  #disable logs only export traces and metrics
  logs:
    exporter: none
  resource:
    attributes:
      service.name: HogwartsForum
  traces:
    sampler: always_on
    exporter: otlp

# Documentation
springdoc:
  api-docs:
    enabled: true

openai:
  model: "gpt-mini-4"
  api-key: ""
  base-url: https://api.openai.com/v1

