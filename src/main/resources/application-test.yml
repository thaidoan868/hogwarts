spring:
  datasource:
    url: jdbc:h2:mem:testb
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none

  flyway:
    enabled: false

  # Email configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: "your-email@gmail.com"
    from-display-name: "Hogwarts Forum"
    password: "app-password"
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  # Maximum file upload size
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 500MB


# Security Configuration
keycloak:
  server-url: null
  realm: null
  client-id: null
  client-secret: null


# minIO
minio:
  endpoint: http://localhost:9000
  access-key: admin
  secret-key: admin123
  bucket: images
  secure: false

# static resource
resources:
  baseResourceUrl: http://localhost:9000 # the image url format is: {imageResourceUrl}/{bucket}/{objectname}
