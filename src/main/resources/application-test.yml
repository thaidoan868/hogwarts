spring:
  datasource:
    url: jdbc:h2:mem:testb
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none

  flyway:
    enabled: false

  # Maximum file upload size
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 500MB


# Security Configuration
keycloak:
  server-url: null
  realm: null
  client-id: null
  client-secret: null


# minIO
minio:
  endpoint: http://localhost:9000
  access-key: admin
  secret-key: admin123
  bucket: images
  secure: false

# static resource
resources:
  imageResourceUrl: http://localhost:9000 # the image url format is: {imageResourceUrl}/{bucket}/{objectname}
